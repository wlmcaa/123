<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同频终端</title>
    <style>
        body { margin: 0; padding: 15px; background: #0d0d0d; color: #eee; font-family: sans-serif; overflow-y: auto; }
        /* 频道切换按钮栏 */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: #222; color: #888; border: 1px solid #444; padding: 5px 15px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #444; color: #fff; border-color: #666; }
        .tab-btn:hover { background: #333; }
        
        /* 面板与文字样式 */
        .panel { display: none; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .panel.active { display: block; }
        .mode-light { color: #88ccff; } /* 表层蓝 */
        .mode-dark { color: #ff4466; }  /* 里层红 */
        
        /* 正文区 */
        .reading-area { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #444; line-height: 1.6; }
        .text-block { margin-bottom: 12px; }
    </style>
</head>
<body>

    <!-- 频道切换按钮（测试点击交互） -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('market')">接单大厅</button>
        <button class="tab-btn" onclick="switchTab('monitor')">实时监控</button>
    </div>

    <!-- 刷单阶段 UI -->
    <div id="layer-market" class="panel active">
        <h3><span class="mode-light" id="m-title-light">等待刷新...</span> | <span class="mode-dark" id="m-title-dark">等待指令</span></h3>
        <p style="color:#aaa;">画像：<span id="m-param-light">-</span> / <span id="m-param-dark" class="mode-dark">-</span></p>
    </div>

    <!-- 实战阶段 UI -->
    <div id="layer-monitor" class="panel">
        <h4 style="margin:0 0 10px 0;">状态：<span id="mon-status">-</span></h4>
        <p style="margin:0 0 10px 0; color:#aaa;">心率：<span id="mon-hr" class="mode-dark">-</span> bpm</p>
        
        <div class="reading-area">
            <div class="text-block" style="color:#aaa;">【环境】<span id="text-env">等待同步...</span></div>
            <div class="text-block" style="color:#ddd;">【肢体】<span id="text-body">等待同步...</span></div>
            <div class="text-block mode-dark">【脑内】<span id="text-mind">等待同步...</span></div>
        </div>
    </div>

    <script>
        // 1. 手动切换频道的逻辑
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
            
            if(tabId === 'market') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('layer-market').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('layer-monitor').classList.add('active');
            }
        }

        // 2. 接收酒馆传来的 JSON 数据
        window.addEventListener('message', function(event) {
            const json = event.data;
            if (!json) return;

            // 收到大厅数据 -> 渲染并自动切到大厅频道
            if (json.大厅) {
                document.getElementById('m-title-light').innerText = json.大厅.标_表 || '-';
                document.getElementById('m-title-dark').innerText = json.大厅.标_里 || '-';
                document.getElementById('m-param-light').innerText = json.画像?.参_表 || '-';
                document.getElementById('m-param-dark').innerText = json.画像?.参_里 || '-';
                switchTab('market');
            } 
            // 收到监控数据 -> 渲染并自动切到监控频道
            else if (json.监控 && json.正文) {
                document.getElementById('mon-status').innerText = `${json.监控.状态_表 || '-'} / ${json.监控.状态_里 || '-'}`;
                document.getElementById('mon-hr').innerText = `${json.监控.心率_表 || '-'} (里:${json.监控.心率_里 || '-'})`;
                
                document.getElementById('text-env').innerText = json.正文.环境施压 || '';
                document.getElementById('text-body').innerText = json.正文.肢体侍弄 || '';
                document.getElementById('text-mind').innerText = json.正文.脑内频道 || '';
                switchTab('monitor');
            }
        });
    </script>
</body>
</html>
